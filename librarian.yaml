    sha256: 4a54e2829977dea29fb0dde856b182a009873c9f1296e4df3ccb35c62511137b
release:
  ignored_changes:
    - .repo-metadata.json
    - docs/README.rst
default:
  output: packages
  tag_format: '{name}-v{version}'
  python:
    common_gapic_paths:
      - samples/generated_samples
      - tests/unit/gapic
      - testing
      - '{neutral-source}/__init__.py'
      - '{neutral-source}/gapic_version.py'
      - '{neutral-source}/py.typed'
      - tests/unit/__init__.py
      - tests/__init__.py
      - setup.py
      - noxfile.py
      - .coveragerc
      - .flake8
      - .repo-metadata.json
      - mypy.ini
      - README.rst
      - LICENSE
      - MANIFEST.in
      - docs/_static/custom.css
      - docs/_templates/layout.html
      - docs/conf.py
      - docs/index.rst
      - docs/multiprocessing.rst
      - docs/README.rst
      - docs/summary_overview.md
    library_type: GAPIC_AUTO
